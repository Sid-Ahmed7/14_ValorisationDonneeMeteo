name: CI

on:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.3'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest weather/tests/ --junitxml=report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/report.xml

      - name: Run linter
        run: uv run ruff check .

      - name: Run security scan
        run: uv run bandit -r . -f json -o bandit-report.json || true

      - name: Upload scan code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-code-report
          path: backend/bandit-report.json

      - name: Build Docker image
        run: docker build -t meteo-app:vtest .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: meteo-app:vtest
          format: json
          output: trivy-report.json
          exit-code: '0'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          trivy-config: trivy.yaml

      - name: Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: backend/trivy-report.json
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to registry (on main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag meteo-app:vtest ${{ secrets.DOCKER_USERNAME }}/meteo-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/meteo-app:latest

